<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ closePop }}" style="height:100%; min-height:0; display:flex; flex-direction:column; font-family:'Plus Jakarta Sans',system-ui,sans-serif; color:var(--txt); background:var(--bg);" data-screen-label="Task detail">

  <sc-if value="{{ showBack }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex; align-items:center; gap:10px; padding:13px 26px; border-bottom:1px solid var(--line); flex:0 0 auto;">
      <button onClick="{{ onBack }}" style="display:inline-flex; align-items:center; gap:7px; height:30px; padding:0 12px; border-radius:9px; font-size:12.5px; font-weight:600; color:var(--txt-2); background:var(--surface); border:1px solid var(--line); cursor:pointer; font-family:inherit;">{{ icBack }} Tasks</button>
      <span style="color:var(--txt-3); font-size:12.5px;">/</span>
      <span style="font-size:12.5px; font-weight:600; color:var(--txt-2);">{{ liveProject }}</span>
    </div>
  </sc-if>

  <div style="flex:1; min-height:0; overflow-y:auto; padding:{{ pad }};">
    <div style="{{ wrapStyle }}">
      <!-- Title + check -->
      <div style="display:flex; align-items:flex-start; gap:13px; margin-bottom:18px;">
        <button onClick="{{ toggle }}" style="{{ checkStyle }}">{{ checkIcon }}</button>
        <div style="flex:1; min-width:0;">
          <div contenteditable="true" style="{{ titleStyle }}">{{ t.title }}</div>
          <sc-if value="{{ fromMeeting }}" hint-placeholder-val="{{ false }}">
            <button onClick="{{ openMeeting }}" style="display:inline-flex; align-items:center; gap:5px; margin-top:8px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; background:var(--lilac-soft); color:#cbb8ff; border:none; cursor:pointer; font-family:inherit;">{{ sparkIcon }} Extracted from {{ meetingTitle }}</button>
          </sc-if>
        </div>
      </div>

      <!-- Property rows — unified click-to-edit editor with popovers -->
      <div style="background:var(--surface); border:1px solid var(--line); border-radius:16px; margin-bottom:18px;">
        <sc-for list="{{ propVMs }}" as="row" hint-placeholder-count="5">
          <div style="{{ row.rowStyle }}">
            <div style="display:flex; align-items:center; gap:8px; width:118px; flex:0 0 auto; color:var(--txt-3); font-size:12px; font-weight:600;">{{ row.icon }}{{ row.label }}</div>
            <div style="flex:1; min-width:0; position:relative;">
              <button onClick="{{ row.open }}" style="{{ row.pillStyle }}">{{ row.valueEl }}{{ row.caret }}</button>
              <sc-if value="{{ row.popOpen }}" hint-placeholder-val="{{ false }}">
                <div onClick="{{ stop }}" style="position:absolute; top:calc(100% + 6px); left:0; z-index:30; min-width:200px; background:var(--surface-2); border:1px solid var(--line-2); border-radius:13px; box-shadow:0 18px 50px rgba(0,0,0,.55); padding:6px;">
                  <sc-for list="{{ row.options }}" as="o" hint-placeholder-count="3">
                    <button onClick="{{ o.pick }}" style="{{ o.style }}">{{ o.iconEl }}<span style="flex:1; text-align:left;">{{ o.label }}</span><sc-if value="{{ o.selected }}" hint-placeholder-val="{{ false }}">{{ checkSm }}</sc-if></button>
                  </sc-for>
                </div>
              </sc-if>
            </div>
          </div>
        </sc-for>
      </div>

      <!-- Description -->
      <div style="margin-bottom:18px;">
        <div style="font-size:10px; font-weight:700; letter-spacing:1px; color:var(--txt-3); text-transform:uppercase; margin-bottom:10px;">Description</div>
        <textarea placeholder="Add more detail, links, or context…" style="width:100%; min-height:84px; background:var(--surface); border:1px solid var(--line); border-radius:14px; color:var(--txt); padding:12px 14px; font-size:13.5px; line-height:1.6; font-family:inherit; resize:vertical; outline:none;"></textarea>
      </div>

      <!-- Subtasks -->
      <div style="margin-bottom:18px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
          <div style="font-size:10px; font-weight:700; letter-spacing:1px; color:var(--txt-3); text-transform:uppercase;">Subtasks · {{ subDone }}/{{ subTotal }}</div>
          <div style="height:5px; width:120px; border-radius:3px; background:var(--surface-2); overflow:hidden;"><div style="{{ subBarStyle }}"></div></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:7px;">
          <sc-for list="{{ subVMs }}" as="s" hint-placeholder-count="3">
            <div style="display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--surface); border:1px solid var(--line); border-radius:12px;">
              <button onClick="{{ s.toggle }}" style="{{ s.checkStyle }}">{{ s.checkIcon }}</button>
              <span style="{{ s.textStyle }}">{{ s.title }}</span>
            </div>
          </sc-for>
          <div style="display:flex; align-items:center; gap:10px; padding:2px 2px;">
            <span style="width:18px; height:18px; border-radius:6px; border:1.5px dashed var(--line-2); flex:0 0 auto;"></span>
            <input value="{{ newSub }}" onInput="{{ onNewSub }}" onKeyDown="{{ onSubKey }}" placeholder="Add subtask… (Enter)" style="flex:1; background:transparent; border:none; outline:none; color:var(--txt); font-family:inherit; font-size:13px;"/>
          </div>
        </div>
      </div>

      <!-- Activity -->
      <div>
        <div style="font-size:10px; font-weight:700; letter-spacing:1px; color:var(--txt-3); text-transform:uppercase; margin-bottom:12px;">Activity</div>
        <div style="display:flex; flex-direction:column; gap:13px;">
          <sc-for list="{{ activity }}" as="ev" hint-placeholder-count="3">
            <div style="display:flex; align-items:flex-start; gap:10px;">
              <span style="width:26px; height:26px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; background:var(--surface-2);">{{ ev.icon }}</span>
              <div style="flex:1;"><div style="font-size:12.5px; line-height:1.45;">{{ ev.text }}</div><div style="font-size:11px; color:var(--txt-3); margin-top:2px;">{{ ev.when }}</div></div>
            </div>
          </sc-for>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:640},&quot;t&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;layout&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;pane&quot;,&quot;page&quot;,&quot;inspector&quot;],&quot;default&quot;:&quot;pane&quot;},&quot;showBack&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;onBack&quot;:{&quot;editor&quot;:null},&quot;onOpenMeeting&quot;:{&quot;editor&quot;:null}}">
class Component extends DCLogic {
  state = { subs:null, openProp:null, ov:{}, newSub:'' };

  ic(name,size,color){
    const P={
      back:'<path d="M15 18l-6-6 6-6"/>', plus:'<path d="M12 5v14M5 12h14"/>', check:'<path d="M20 6 9 17l-5-5"/>',
      sparkles:'<path d="M12 3l1.9 4.6L18.5 9.5 13.9 11.4 12 16l-1.9-4.6L5.5 9.5 10.1 7.6z"/>',
      flag:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22v-7"/>',
      circle:'<circle cx="12" cy="12" r="9"/>', clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
      layers:'<path d="M12 2 2 7l10 5 10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>',
      user:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      meetings:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
      edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/>',
      arrowUp:'<path d="M18 15l-6-6-6 6"/>', minus:'<path d="M5 12h14"/>', chevD:'<path d="M6 9l6 6 6-6"/>', x:'<path d="M18 6 6 18M6 6l12 12"/>'
    };
    return React.createElement('svg',{viewBox:'0 0 24 24',width:size||16,height:size||16,fill:'none',stroke:color||'currentColor',strokeWidth:1.9,style:{flex:'0 0 auto'},dangerouslySetInnerHTML:{__html:P[name]||P.circle}});
  }
  av(name,grad,size){ const p=(name||'').trim().split(/\s+/); const ini=((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase();
    return React.createElement('span',{style:{ width:size, height:size, borderRadius:'34%', display:'grid', placeItems:'center', fontWeight:800, color:'#241636', fontSize:size*0.42, background:grad||'var(--lilac)', flex:'0 0 auto' }},ini); }
  dot(c){ return React.createElement('span',{style:{width:8,height:8,borderRadius:'50%',background:c,flex:'0 0 auto'}}); }

  defaultSubs(){ return [
    { id:'s1', title:'Pull latest redline from legal', done:true },
    { id:'s2', title:'Compare against last signed version', done:false },
    { id:'s3', title:'Send summary of changes to Maya', done:false },
  ]; }

  opts(){
    const G={ mint:'linear-gradient(150deg,#74e0bc,#46c79f)', lilac:'linear-gradient(150deg,#b79cff,#9a7af0)', sky:'linear-gradient(150deg,#8ab4ff,#6b96ec)', gold:'linear-gradient(150deg,#ffce6b,#f0b43f)', coral:'linear-gradient(150deg,#ff9173,#f06a4c)' };
    return {
      status:[{v:'open',label:'To do',color:'var(--sky)'},{v:'doing',label:'In progress',color:'var(--gold)'},{v:'done',label:'Completed',color:'var(--mint)'}],
      priority:[{v:'high',label:'High',color:'var(--danger)',icon:'arrowUp'},{v:'med',label:'Medium',color:'var(--gold)',icon:'minus'},{v:'low',label:'Low',color:'var(--txt-3)',icon:null}],
      due:[{v:'Today',label:'Today'},{v:'Tomorrow',label:'Tomorrow'},{v:'Wed',label:'Wednesday'},{v:'Fri',label:'Friday'},{v:'Next week',label:'Next week'},{v:'',label:'No date'}],
      project:[{v:'Skio Integration',label:'Skio Integration',color:'var(--accent)'},{v:'Q3 Roadmap',label:'Q3 Roadmap',color:'var(--mint)'},{v:'Onboarding revamp',label:'Onboarding revamp',color:'var(--gold)'},{v:'',label:'No project',color:'var(--txt-3)'}],
      assignee:[{v:'You',label:'You',grad:null},{v:'Maya Kerr',label:'Maya Kerr',grad:G.lilac},{v:'Devon Vale',label:'Devon Vale',grad:G.mint},{v:'Jules Lin',label:'Jules Lin',grad:G.sky},{v:'Sam Owens',label:'Sam Owens',grad:G.lilac},{v:'Rae Adler',label:'Rae Adler',grad:G.gold}]
    };
  }

  renderVals(){
    const t=this.props.t||{}; const layout=this.props.layout||'pane';
    const subs=this.state.subs||this.defaultSubs(); const setSubs=(fn)=>this.setState({subs:fn(subs)});
    const ov=this.state.ov; const O=this.opts();
    // live values (overrides win)
    const v={ status:ov.status||t.status||'open', priority:ov.priority||t.priority||'low', due:('due'in ov)?ov.due:(t.due||''), project:('project'in ov)?ov.project:(t.project||''), assignee:ov.assignee||t.ownerName||(t.owner==='You'?'You':t.owner)||'You', assigneeGrad: ('assignee'in ov)?ov.assigneeGrad:t.ownerGrad };
    const done=v.status==='done';

    const sObj=O.status.find(x=>x.v===v.status)||O.status[0];
    const pObj=O.priority.find(x=>x.v===v.priority)||O.priority[2];
    const prjObj=O.project.find(x=>x.v===v.project);
    const asObj=O.assignee.find(x=>x.v===v.assignee)||O.assignee[0];

    const pillStyle={ display:'inline-flex',alignItems:'center',gap:7,fontSize:12.5,fontWeight:700,padding:'5px 10px',borderRadius:9,border:'1px solid var(--line-2)',background:'var(--surface-2)',color:'var(--txt)',cursor:'pointer',fontFamily:'inherit',maxWidth:'100%' };
    const optBase={ display:'flex',alignItems:'center',gap:9,width:'100%',padding:'8px 10px',borderRadius:9,border:'none',background:'transparent',color:'var(--txt)',cursor:'pointer',fontFamily:'inherit',fontSize:12.5,fontWeight:600,textAlign:'left' };
    const optSel={ ...optBase, background:'var(--surface-3)' };
    const setProp=(key,val,extra)=>{ this.setState({ ov:{...ov,[key]:val,...(extra||{})}, openProp:null }); };
    const openProp=this.state.openProp;
    const mkOpts=(key,list,curr,renderIcon)=>list.map(o=>({ label:o.label, selected:o.v===curr, iconEl:renderIcon(o), pick:(e)=>{ e&&e.stopPropagation&&e.stopPropagation(); const extra=key==='assignee'?{assigneeGrad:o.grad}:{}; setProp(key,o.v,extra); } , style:o.v===curr?optSel:optBase }));

    const caret=this.ic('chevD',13,'var(--txt-3)');
    const rowBase={ display:'flex', alignItems:'center', gap:12, padding:'11px 16px', borderBottom:'1px solid var(--line)' };
    const rowLast={ ...rowBase, borderBottom:'none' };

    const propVMs=[
      { label:'Status', icon:this.ic('circle',14,'var(--txt-3)'), rowStyle:rowBase, pillStyle, caret,
        valueEl:React.createElement('span',{style:{display:'inline-flex',alignItems:'center',gap:7}},this.dot(sObj.color),sObj.label),
        open:(e)=>{e.stopPropagation();this.setState({openProp:openProp==='status'?null:'status'});}, popOpen:openProp==='status',
        options:mkOpts('status',O.status,v.status,(o)=>this.dot(o.color)) },
      { label:'Priority', icon:this.ic('flag',14,'var(--txt-3)'), rowStyle:rowBase, pillStyle, caret,
        valueEl:React.createElement('span',{style:{display:'inline-flex',alignItems:'center',gap:7,color:pObj.color}},pObj.icon?this.ic(pObj.icon,13,pObj.color):this.dot(pObj.color),pObj.label),
        open:(e)=>{e.stopPropagation();this.setState({openProp:openProp==='priority'?null:'priority'});}, popOpen:openProp==='priority',
        options:mkOpts('priority',O.priority,v.priority,(o)=>o.icon?this.ic(o.icon,13,o.color):this.dot(o.color)) },
      { label:'Due', icon:this.ic('clock',14,'var(--txt-3)'), rowStyle:rowBase, pillStyle, caret,
        valueEl:React.createElement('span',{style:{display:'inline-flex',alignItems:'center',gap:7,color:v.due?'var(--gold)':'var(--txt-3)'}},this.ic('clock',13,v.due?'var(--gold)':'var(--txt-3)'),v.due||'No date'),
        open:(e)=>{e.stopPropagation();this.setState({openProp:openProp==='due'?null:'due'});}, popOpen:openProp==='due',
        options:mkOpts('due',O.due,v.due,(o)=>this.ic('clock',13,'var(--txt-3)')) },
      { label:'Project', icon:this.ic('layers',14,'var(--txt-3)'), rowStyle:rowBase, pillStyle, caret,
        valueEl:React.createElement('span',{style:{display:'inline-flex',alignItems:'center',gap:7}},this.dot(prjObj?prjObj.color:'var(--txt-3)'),v.project||'No project'),
        open:(e)=>{e.stopPropagation();this.setState({openProp:openProp==='project'?null:'project'});}, popOpen:openProp==='project',
        options:mkOpts('project',O.project,v.project,(o)=>this.dot(o.color)) },
      { label:'Assignee', icon:this.ic('user',14,'var(--txt-3)'), rowStyle:rowLast, pillStyle, caret,
        valueEl:React.createElement('span',{style:{display:'inline-flex',alignItems:'center',gap:7}}, v.assignee==='You'?React.createElement('span',{style:{width:18,height:18,borderRadius:'34%',display:'grid',placeItems:'center',fontWeight:800,fontSize:8,background:'var(--surface-3)',color:'var(--txt-2)'}},'me'):this.av(v.assignee,v.assigneeGrad,18), v.assignee),
        open:(e)=>{e.stopPropagation();this.setState({openProp:openProp==='assignee'?null:'assignee'});}, popOpen:openProp==='assignee',
        options:mkOpts('assignee',O.assignee,v.assignee,(o)=>o.v==='You'?React.createElement('span',{style:{width:18,height:18,borderRadius:'34%',display:'grid',placeItems:'center',fontWeight:800,fontSize:8,background:'var(--surface-3)',color:'var(--txt-2)'}},'me'):this.av(o.label,o.grad,18)) },
    ];

    const mkCheck=(d,big)=>({ width:big?22:18,height:big?22:18,borderRadius:big?7:6,flex:'0 0 auto',cursor:'pointer',display:'grid',placeItems:'center',border:d?'none':'1.5px solid var(--line-2)',background:d?'var(--mint)':'transparent',marginTop:big?2:0 });
    const subVMs=subs.map(sb=>({ ...sb, toggle:()=>setSubs(list=>list.map(x=>x.id===sb.id?{...x,done:!x.done}:x)),
      checkStyle:mkCheck(sb.done), checkIcon:sb.done?this.ic('check',11,'#0e1a14'):null,
      textStyle:{ fontSize:13, fontWeight:500, textDecoration:sb.done?'line-through':'none', color:sb.done?'var(--txt-3)':'var(--txt)' } }));
    const subDone=subs.filter(x=>x.done).length;

    const activity=[
      { icon:this.ic('sparkles',13,'var(--lilac)'), text:'Created from action items in '+(t.meetingTitle||'a meeting'), when:'Tue, Jun 9 · 10:42 AM' },
      { icon:this.ic('user',13,'var(--txt-2)'), text:'Assigned to '+(t.ownerName||t.owner||'you'), when:'Tue, Jun 9 · 10:43 AM' },
      { icon:this.ic('edit',13,'var(--txt-2)'), text:'Due date set to '+(t.due||'—'), when:'Tue, Jun 9 · 10:43 AM' },
    ];

    const addSub=()=>{ const val=(this.state.newSub||'').trim(); if(!val) return; setSubs(list=>[...list,{id:'s'+Date.now(),title:val,done:false}]); this.setState({newSub:''}); };

    return {
      t, layout, pad: this.props.showBack?'24px 26px 30px':'26px 30px 30px', liveProject:v.project||'No project',
      wrapStyle:{ maxWidth: layout==='inspector'?'100%':'720px', margin: layout==='inspector'?'0':'0 auto' },
      showBack:this.props.showBack||false, onBack:this.props.onBack, icBack:this.ic('back',15),
      toggle:()=>setProp('status',done?'open':'done'), checkStyle:mkCheck(done,true), checkIcon:done?this.ic('check',14,'#0e1a14'):null,
      titleStyle:{ fontFamily:'Bricolage Grotesque,sans-serif', fontSize:21, fontWeight:800, letterSpacing:'-.4px', lineHeight:1.25, outline:'none', textDecoration:done?'line-through':'none', color:done?'var(--txt-3)':'var(--txt)' },
      fromMeeting:!!t.fromMeeting, openMeeting:()=>this.props.onOpenMeeting&&this.props.onOpenMeeting(t.meeting), meetingTitle:t.meetingTitle||'a meeting', sparkIcon:this.ic('sparkles',11,'#cbb8ff'),
      propVMs, checkSm:this.ic('check',13,'var(--accent)'),
      closePop:()=>{ if(this.state.openProp) this.setState({openProp:null}); }, stop:(e)=>e.stopPropagation(),
      subVMs, subDone, subTotal:subs.length, subBarStyle:{ height:'100%', width:(subs.length?Math.round(subDone/subs.length*100):0)+'%', background:'var(--mint)', borderRadius:3 },
      newSub:this.state.newSub, onNewSub:(e)=>this.setState({newSub:e.target.value}), onSubKey:(e)=>{ if(e.key==='Enter'){ e.preventDefault(); addSub(); } },
      activity
    };
  }
}
</script>
</body>
</html>
