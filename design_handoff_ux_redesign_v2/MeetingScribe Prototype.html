<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MeetingScribe — Redesign Prototype</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="proto/styles.css">
<style>
/* Tasks sub-nav shared styles */
.tasks-subnav{
  width:210px; flex:0 0 auto; border-right:1px solid var(--line); background:var(--bg);
  padding:16px 10px; overflow-y:auto;
}
.subnav-it{
  display:flex; align-items:center; gap:9px; padding:7px 10px; border-radius:8px;
  font-size:13px; color:var(--txt-2); width:100%; border:none; background:transparent;
  cursor:pointer; margin-bottom:2px;
}
.subnav-it:hover{ background:var(--surface); color:var(--txt); }
.subnav-it.on{ background:var(--accent-soft); color:var(--txt); font-weight:700; }
.subnav-it svg{ flex:0 0 auto; }

/* Kanban lane */
.kanban-lane{
  width:256px; flex:0 0 auto; background:rgba(244,240,232,.035); border-radius:14px;
  padding:9px; display:flex; flex-direction:column; gap:8px;
  border:1px solid transparent;
}

/* Ensure scrollable sections fill height */
.body > div, .main{ height:100%; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Load order matters: data → tweaks → recording → shell → sections → app -->
<script type="text/babel" src="proto/data.jsx"></script>
<script type="text/babel" src="proto/tweaks-panel.jsx"></script>
<script type="text/babel" src="proto/recording.jsx"></script>
<script type="text/babel" src="proto/shell.jsx"></script>
<script type="text/babel" src="proto/tasks.jsx"></script>
<script type="text/babel" src="proto/people.jsx"></script>
<script type="text/babel" src="proto/meetings.jsx"></script>
<script type="text/babel" src="proto/today.jsx"></script>
<script type="text/babel" src="proto/app.jsx"></script>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="80" fill="#15121a"/>
  <rect x="8" y="8" width="28" height="64" rx="6" fill="#100d15" stroke="#b79cff" stroke-width=".8" stroke-opacity=".3"/>
  <circle cx="22" cy="18" r="5" fill="url(#grad)"/>
  <rect x="13" y="30" width="18" height="3" rx="1.5" fill="#b79cff" opacity=".9"/>
  <rect x="13" y="36" width="14" height="2" rx="1" fill="#f3eef6" opacity=".35"/>
  <rect x="13" y="41" width="16" height="2" rx="1" fill="#f3eef6" opacity=".35"/>
  <rect x="13" y="46" width="12" height="2" rx="1" fill="#f3eef6" opacity=".25"/>
  <rect x="42" y="8" width="70" height="64" rx="6" fill="#1e1925"/>
  <rect x="48" y="14" width="40" height="7" rx="2" fill="#ff9173" opacity=".9"/>
  <rect x="48" y="26" width="55" height="3" rx="1.5" fill="#f3eef6" opacity=".5"/>
  <rect x="48" y="32" width="40" height="2" rx="1" fill="#f3eef6" opacity=".3"/>
  <rect x="48" y="40" width="55" height="12" rx="4" fill="#271f31"/>
  <rect x="52" y="43" width="25" height="2" rx="1" fill="#f3eef6" opacity=".5"/>
  <rect x="52" y="47" width="18" height="2" rx="1" fill="#f3eef6" opacity=".3"/>
  <rect x="48" y="56" width="55" height="10" rx="4" fill="#271f31"/>
  <rect x="52" y="59" width="30" height="2" rx="1" fill="#f3eef6" opacity=".4"/>
  <rect x="52" y="63" width="20" height="2" rx="1" fill="#f3eef6" opacity=".25"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9173"/>
      <stop offset="100%" stop-color="#b79cff"/>
    </linearGradient>
  </defs>
</svg>
</template>
</body>
</html>
