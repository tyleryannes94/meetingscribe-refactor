name: CI

# Gates day-to-day development — runs on every push to main and every PR, so a
# regression is caught immediately instead of only at release time (the existing
# release.yml runs tests solely on tag pushes). Build warnings are allowed
# (the package opts into StrictConcurrency=targeted, which surfaces many);
# only hard errors and failing tests block.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Pin to Swift 5.10 (Xcode 15.4). The package is swift-tools 5.10 and opts
      # into StrictConcurrency=targeted, which produces concurrency *warnings*
      # under Swift 5.10 — matching the local `make dev` build that passes.
      # Newer default runner toolchains escalate some of those to errors, which
      # is what turned the first CI run red despite a clean local build.
      # Select the newest Swift 5.10 toolchain (Xcode 15.x) available on the
      # runner, rather than a hardcoded path that may not exist. Swift 5.10
      # keeps the package's StrictConcurrency=targeted items as warnings, which
      # is the behavior the local `make dev` build passes under.
      - name: Select Swift 5.10 toolchain (Xcode 15.x)
        run: |
          echo "== Installed Xcodes =="; ls -d /Applications/Xcode*.app || true
          XC=$(ls -d /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XC" ]; then echo "Selecting $XC"; sudo xcode-select -s "$XC"; else echo "No Xcode 15.x present — using default toolchain"; fi

      - name: Swift version
        run: swift --version

      - name: Build (release — matches `make dev`)
        run: swift build -c release

      - name: Test
        run: swift test
