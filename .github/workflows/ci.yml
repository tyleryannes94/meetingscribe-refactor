name: CI

# Gates day-to-day development — runs on every push to main and every PR, so a
# regression is caught immediately instead of only at release time (release.yml
# runs tests solely on tag pushes). Build warnings are allowed (the package opts
# into StrictConcurrency=targeted, which surfaces many); only hard errors and
# failing tests block.
#
# Toolchain: build on Swift 6.x via the macos-15 runner's default Xcode 16. This
# matches the toolchain the app is developed against locally, where the package's
# StrictConcurrency=targeted items remain *warnings*. Earlier revisions pinned
# Xcode 15.4 / Swift 5.10, but that toolchain (a) escalates two Timer-closure
# concurrency items in ScribeCore/Detection to hard errors under the macOS 14 SDK
# and (b) hits a frontend `fatalError` crash compiling TranscriptionLog. Both are
# gone on Swift 6.x, so CI tracks the same compiler used locally rather than an
# older pinned one. (Do not re-pin an older Xcode here without checking it builds
# clean — the previous path-glob pin silently selected 5.10 and turned CI red.)
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # ARCH-1 ratchet: block NEW cross-tree duplication between
      # Sources/MeetingScribe and Sources/ScribeCore (and force the baseline
      # allowlist to shrink as files get de-duped into a shared library).
      - name: Guard — no new cross-tree duplication
        run: ./scripts/check-cross-tree-dupes.sh

      # Design-system guard: fail on re-introduced raw fonts / priority-status
      # X3 button-chrome bans are now zero across UI/. Flip back to `fail` so
      # the CI guards against regressions. Intentional exceptions still carry
      # a trailing `// design-lint:allow` and are excluded from the count.
      - name: Guard — design-system drift
        run: ./scripts/design-lint.sh fail

      - name: Build (release — matches local `make dev`)
        run: swift build -c release
        env:
          CI: "true"

      - name: Test
        run: swift test
        env:
          CI: "true"
